<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Checklist</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <div class="top-row">
                <h1>Checklist</h1>
                <button
                    id="manage-cats-btn"
                    class="icon-btn-lg"
                    aria-label="Gestionar categorías"
                >
                    ⚙️
                </button>
            </div>

            <div class="add-row">
                <div class="add-row-inner">
                    <input
                        type="text"
                        id="new-item"
                        placeholder="Agregar tarea..."
                        autocomplete="off"
                    />
                    <input
                        type="text"
                        id="new-category"
                        placeholder="Categoría"
                        list="category-options"
                        autocomplete="off"
                    />
                </div>
                <button id="add-btn">Agregar</button>
                <datalist id="category-options"></datalist>
            </div>

            <h2>Pendientes</h2>
            <div id="pending-crumb" class="crumb" style="display: none"></div>
            <div id="pending-view"></div>
            <div id="empty-msg" class="empty" style="display: none">
                No hay tareas pendientes.
            </div>

            <div id="completed-section" style="display: none">
                <h2>Completadas</h2>
                <div
                    id="completed-crumb"
                    class="crumb"
                    style="display: none"
                ></div>
                <div id="completed-view"></div>
            </div>
        </div>

        <div class="overlay" id="confirm-overlay">
            <div class="modal">
                <h3 id="confirm-text">¿Agregar esta tarea?</h3>
                <div class="modal-actions">
                    <button class="btn-cancel" id="confirm-cancel">
                        Cancelar
                    </button>
                    <button class="btn-confirm" id="confirm-ok">Si</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="edit-overlay">
            <div class="modal">
                <h3>Editar</h3>
                <div class="row">
                    <label>Tarea</label>
                    <input type="text" id="edit-text" />
                </div>
                <div class="row">
                    <label>Categoría</label>
                    <input
                        type="text"
                        id="edit-category"
                        placeholder="Categoría"
                        list="category-options"
                        autocomplete="off"
                    />
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" id="edit-cancel">
                        Cancelar
                    </button>
                    <button class="btn-confirm" id="edit-save">Guardar</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="categories-overlay">
            <div class="modal modal-wide">
                <h3>Gestionar categorías</h3>
                <div class="new-cat-row">
                    <input
                        type="text"
                        id="new-cat-name"
                        placeholder="Nueva categoría..."
                        autocomplete="off"
                    />
                    <button id="new-cat-btn" class="btn-confirm">Crear</button>
                </div>
                <div id="categories-list" class="categories-list"></div>
                <div class="modal-actions">
                    <button class="btn-confirm" id="categories-close">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
